name: Build Windows 10 Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker Image
        run: docker build -t dharma-pc:latest .
      
      - name: Verify Image
        run: docker images | grep dharma-pc
